# Prometheus scrape config for Vitrin (Phase F).
# Run with: prometheus --config.file=infra/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: vitrin-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels: { service: api }
  - job_name: vitrin-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8080"]
        labels: { service: gateway }
