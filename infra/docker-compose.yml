# ACIP — on-premise development topology (Phase 0, App D / REQ-M1-002).
# Single-host Docker Compose; the same services move to Kubernetes unchanged.
#
# Network segmentation (REQ-M1-009): in PRODUCTION only `api` and `gateway`
# publish host ports; datastores stay internal. This DEV compose additionally
# publishes elasticsearch (9200), postgres (5432) and redis (6379) so you can
# run the app on the host (the common local-dev case in .env.example) against
# Docker-hosted datastores. Remove those `ports:` for a locked-down deployment.
#
# Values are illustrative dev defaults; production sources secrets from a
# secret store and enables CA-verified TLS everywhere (REQ-M1-003/010).

name: acip

x-python-build: &python-build
  build:
    context: ..
    dockerfile: infra/Dockerfile.python

services:
  elasticsearch: # data spine: BM25 + dense_vector + RRF, DiskBBQ, ACORN (M1)
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    environment:
      - discovery.type=single-node
      # Dev: security OFF so a host-run app (the common local-dev case) connects
      # with no password over plain http on localhost:9200. Production enables
      # auth + CA-verified TLS with mounted certs (REQ-M1-003).
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    # Published so an app running on the host (per .env.example) can reach it.
    ports:
      - "9200:9200"
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 4g
    healthcheck:
      # curl-free: the ES image's entrypoint is bash, so a /dev/tcp probe is
      # available and is scheme-agnostic (works regardless of TLS).
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/9200"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  kibana: # observability surface (REQ-M12-011); ops-only
    image: docker.elastic.co/kibana/kibana:9.4.2
    environment:
      # Dev cluster has security off (see elasticsearch service), so no creds.
      # Production switches to the kibana_system user or a service-account token.
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks: [internal]
    depends_on:
      elasticsearch:
        condition: service_healthy

  postgres: # control plane: tenants, keys, plans, usage (M1)
    image: postgres:18
    environment:
      - POSTGRES_DB=${PG_DB:-acip}
      - POSTGRES_USER=${PG_USER:-acip}
      - POSTGRES_PASSWORD=${PG_PASSWORD:-acip}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d:ro
    # Published so a host-run app/worker (per .env.example) can reach it.
    ports:
      - "5432:5432"
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-acip} -d ${PG_DB:-acip}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis: # cache + queue + rate limits (M1)
    image: redis:8
    # Published so a host-run app/worker (per .env.example) can reach it.
    ports:
      - "6379:6379"
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  embeddings: # self-hosted embedding model (BGE-M3 / Qwen3-Embedding) — wired in M4
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command: ["--model-id", "BAAI/bge-m3"]
    networks: [internal]
    profiles: ["inference"] # opt-in; heavy. Enable with: --profile inference

  reranker: # self-hosted cross-encoder (BGE/Qwen3 reranker) — wired in M5
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command: ["--model-id", "BAAI/bge-reranker-v2-m3"]
    networks: [internal]
    profiles: ["inference"]

  llm: # self-hosted generation (Qwen3.x / Gemma) via vLLM — wired in M7
    image: vllm/vllm-openai:latest
    command: ["--model", "Qwen/Qwen3-0.6B", "--enable-prefix-caching"]
    networks: [internal]
    profiles: ["inference"]

  gateway: # AI gateway shell (M6) — externally exposed
    <<: *python-build
    command: ["uvicorn", "gateway.main:app", "--host", "0.0.0.0", "--port", "8080"]
    env_file: [../.env]
    # .env targets host-run mode (localhost); inside compose we reach datastores
    # by service name. These overrides win over env_file values.
    environment:
      - ES_HOST=http://elasticsearch:9200
      - ES_PASSWORD=
      - PG_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - EMBEDDINGS_URL=http://embeddings:80
      - RERANKER_URL=http://reranker:80
      - LLM_URL=http://llm:8000
    ports:
      - "8080:8080"
    networks: [internal]
    depends_on:
      redis:
        condition: service_healthy

  api: # public API (M1/§12) — externally exposed
    <<: *python-build
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: [../.env]
    environment:
      - ES_HOST=http://elasticsearch:9200
      - ES_PASSWORD=
      - PG_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - EMBEDDINGS_URL=http://embeddings:80
      - RERANKER_URL=http://reranker:80
      - LLM_URL=http://llm:8000
    ports:
      - "8000:8000"
    networks: [internal]
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker: # Celery worker (M3/M4/M10) — internal only
    <<: *python-build
    command: ["celery", "-A", "worker.celery_app", "worker", "--loglevel=INFO"]
    env_file: [../.env]
    environment:
      - ES_HOST=http://elasticsearch:9200
      - ES_PASSWORD=
      - PG_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - EMBEDDINGS_URL=http://embeddings:80
      - RERANKER_URL=http://reranker:80
      - LLM_URL=http://llm:8000
    networks: [internal]
    depends_on:
      redis:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes:
  es-data:
  pg-data:
