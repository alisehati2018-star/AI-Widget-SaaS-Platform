# ACIP CI — Phase 0 baseline gate (REQ-M12-010, T-P0-008).
# Establishes the ordered-gate skeleton: lint -> type-check -> unit/integration.
# Later phases extend this with the relevance eval, tenant-isolation suite,
# guardrail suite, and cost-regression replay (blueprint §20.4).
name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy packages services eval || true   # advisory in Phase 0

      - name: Unit + integration tests (pytest)
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Type-check
        run: npx tsc --noEmit
