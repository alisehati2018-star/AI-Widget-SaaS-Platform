# ACIP CI (REQ-M12-010, §20.4).
# Ordered gates: lint -> type-check -> unit tests (hermetic), then an ES-backed
# integration job (analyzer/isolation round trips) + the golden-set relevance
# eval. Guardrail + cost-regression gates arrive in Phase 2/3.
name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy packages services eval

      - name: Unit tests (hermetic, hard gate)
        run: pytest -q

      # Ordered release gates (REQ-M12-010, §20.4). Each is blocking.
      - name: Tenant-isolation gate (RELEASE BLOCKER, REQ-M11-005)
        run: pytest -q tests/test_isolation.py

      - name: Guardrail / prompt-injection gate (REQ-M7-005)
        run: pytest -q tests/test_injection.py

      - name: Security & resilience gate (REQ-M11-003, REQ-M12-002)
        run: pytest -q tests/test_security.py

      # Cost-regression replay gate (REQ-M12-008) runs against a labelled traffic
      # sample in the Validation phase — placeholder kept visible here.
      - name: Cost-regression gate (deferred — Validation phase)
        run: echo "cost-regression replay runs with real traffic (DV-104)"

  integration:
    runs-on: ubuntu-latest
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"   # test-only; dev/prod use auth
          ES_JAVA_OPTS: -Xms1g -Xmx1g
        ports:
          - 9200:9200
        options: >-
          --health-cmd "bash -c 'exec 3<>/dev/tcp/localhost/9200'"
          --health-interval 15s --health-timeout 10s --health-retries 12
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: acip
          POSTGRES_USER: acip
          POSTGRES_PASSWORD: acip
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U acip -d acip"
          --health-interval 10s --health-timeout 5s --health-retries 10
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 10
    env:
      ES_HOST: http://localhost:9200
      ES_PASSWORD: ""
      PG_HOST: localhost
      PG_PORT: "5432"
      PG_DB: acip
      PG_USER: acip
      PG_PASSWORD: acip
      REDIS_URL: redis://localhost:6379/0
      AUTH_SECRET: integration-secret-0123456789abcdef
      ADMIN_TOKEN: integration-operator-token
      BILLING_WEBHOOK_SECRET: integration-whsec
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Apply control-plane migrations (Postgres)
        run: |
          python - <<'PY'
          import asyncio, glob, asyncpg, os
          async def main():
              dsn = f"postgresql://{os.environ['PG_USER']}:{os.environ['PG_PASSWORD']}@{os.environ['PG_HOST']}:{os.environ['PG_PORT']}/{os.environ['PG_DB']}"
              conn = await asyncpg.connect(dsn)
              for f in sorted(glob.glob("db/migrations/*.sql")):
                  await conn.execute(open(f).read())
                  print("applied", f)
              await conn.close()
          asyncio.run(main())
          PY
      - name: Integration tests (ES + PG-backed flows)
        run: pytest -q tests/integration
      - name: Load smoke (ES-free; health endpoint)
        run: |
          PYTHONPATH=packages:services python -m uvicorn api.main:app --port 8000 &
          sleep 6
          python -m eval.load_test --url http://localhost:8000 --path /healthz --requests 500 --concurrency 25
      - name: Relevance eval (golden-set dry run)
        run: python -m eval.run_eval --golden eval/golden_set/golden_set.example.jsonl

  frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ["apps/dashboard", "apps/web"]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Frontend QA gates (web)
        if: matrix.app == 'apps/web'
        run: npm run lint
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build
        run: npx next build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
